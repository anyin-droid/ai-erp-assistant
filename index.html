<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ERP Assistant</title>

    <style>

        body{
            font-family: Arial;
            margin: 40px;
        }

        input{
            width: 400px;
            padding: 10px;
        }

        button{
            padding: 10px;
            cursor: pointer;
        }

        pre{
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 10px;
            table{
                border-collapse: collapse;
                margin-top: 20px;
            }

            th{
                background-color: #f4f4f4;
            }
        }

    </style>

</head>
<body>

    <h1>AI ERP Assistant</h1>
    <div style="
    border:1px solid #ccc;
    padding:15px;
    margin-bottom:20px;
    ">

    <h2>AI ERP Dashboard</h2>

    <div id="statsDiv">
        載入統計資料中...
    </div>

    </div>
    <input 
        type="text"
        id="question"
        placeholder="請輸入查詢需求"
    >

    <button onclick="askAI()">
        查詢
    </button>
    <button onclick="loadLogs()">
    查看查詢紀錄
    </button>
    <h3>最近五筆查詢</h3>

    <div id="recentDiv">
        載入中...
    </div>
<div id="logsDiv"></div>


    <h2>查詢結果</h2>

    <pre id="result"></pre>

    <script>

        async function askAI(){

            const question = document.getElementById("question").value

            const response = await fetch("http://127.0.0.1:8000/ask",{
                method: "POST",

                headers:{
                        "Content-Type":"application/json"
                },
                body: JSON.stringify({
                        question: question
                })
            })

            const data = await response.json()
            const resultDiv = document.getElementById("result")

// Loading
resultDiv.innerHTML = "AI 查詢中..."

try{

    const response = await fetch(
        "http://127.0.0.1:8000/ask",
        {
            method: "POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({
                question: question
            })
        }
    )

    const data = await response.json()
        // SQL 顯示
        // 如果有 error
                if(data.error){

                    resultDiv.innerHTML = `
                        <h3>錯誤</h3>
                        <p>${data.error}</p>
                    `

                    return
                }
                let html = `
                    <h3>AI 產生的 SQL</h3>
                    <pre>${data.sql}</pre>
                `

                // result
                if(data.result && data.result.length > 0){

                    html += "<h3>查詢結果</h3>"

                    html += "<table border='1' cellpadding='10'>"

                    // table header
                    html += "<tr>"

                    Object.keys(data.result[0]).forEach(key => {
                        html += `<th>${key}</th>`
                    })

                    html += "</tr>"

                    // table body
                    data.result.forEach(row => {

                        html += "<tr>"

                        Object.values(row).forEach(value => {
                            html += `<td>${value}</td>`
                        })

                        html += "</tr>"
                    })

                    html += "</table>"

                }else{

                    html += "<p>查無資料</p>"
                }

                resultDiv.innerHTML = html

            }catch(error){

                resultDiv.innerHTML =
                    "<p>發生錯誤，請稍後再試</p>"

            }
        }
            async function loadLogs(){

            const response = await fetch(
            "http://127.0.0.1:8000/logs"
            )

            const data = await response.json()

            let html = `
                <h2>查詢紀錄</h2>

                <table border="1" cellpadding="10">
                    <tr>
                        <th>ID</th>
                        <th>問題</th>
                        <th>SQL</th>
                        <th>時間</th>
                    </tr>
    `

            data.logs.forEach(log => {

                html += `
                    <tr>
                        <td>${log.id}</td>
                        <td>${log.question}</td>
                        <td>${log.sql_text}</td>
                        <td>${log.created_at}</td>
                    </tr>
                `
            })

            html += "</table>"

            document.getElementById(
                "logsDiv"
            ).innerHTML = html
            }
            async function loadStats(){

            const response = await fetch(
                "http://127.0.0.1:8000/stats"
            )

            const data = await response.json()

            document.getElementById("statsDiv").innerHTML = `
                <h3>Dashboard Statistics</h3>

                <p>
                    總查詢次數：
                    ${data.total_queries}
                </p>
                <p>
                    今日查詢：
                    ${data.today_queries}
                </p>
                <p>
                    最近查詢：
                    ${data.latest_question}
                </p>

                <p>
                    最常查詢：
                    ${data.popular_question}
                </p>
            `
            }

            async function loadRecent(){

            const response = await fetch(
                "http://127.0.0.1:8000/recent"
            )

            const data = await response.json()

            let html = "<ul>"

            data.recent.forEach(item => {

                html += `<li>${item.question}</li>`

            })

            html += "</ul>"

            document.getElementById(
                "recentDiv"
            ).innerHTML = html
            }
    
    loadStats()
    loadRecent()
    </script>


<hr>
</body>
</html>
